<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Digit Product Sum</title>

<style>
body{
    font-family: Arial;
    background: linear-gradient(to right,#ff0026,#7d3d58);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.box{
    background:white;
    padding:30px;
    border-radius:10px;
    width:350px;
    text-align:center;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    padding:12px;
    width:100%;
    background:#ff4b7d;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#e63e6d;
}

#result{
    margin-top:20px;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="box">
<h2>Digit Product Sum</h2>

<input type="number" id="num1" placeholder="Enter n1">
<input type="number" id="num2" placeholder="Enter n2">

<button onclick="calculate()">Calculate</button>

<div id="result"></div>
</div>

<script>

function calculate(){

    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

    // Convert to string
    n1 = n1.toString();
    n2 = n2.toString();

    // Pad with leading zeros
    let maxLength = Math.max(n1.length, n2.length);
    n1 = n1.padStart(maxLength, "0");
    n2 = n2.padStart(maxLength, "0");

    let sum = 0;

    for(let i = 0; i < maxLength; i++){
        sum += Number(n1[i]) * Number(n2[i]);
    }

    document.getElementById("result").innerHTML =
        "Sum of Digit Products = " + sum;
}

</script>

</body>
</html>
