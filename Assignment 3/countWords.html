<!DOCTYPE html>
<html>
<head>
<title>Advanced Word Counter</title>

<style>
body{
    font-family: Arial;
    background: #f4f6f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:25px;
    width:400px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.2);
    text-align:center;
}

textarea{
    width:100%;
    height:120px;
    padding:10px;
    margin-top:10px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    margin-top:15px;
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

#result{
    margin-top:15px;
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Paragraph Word Counter</h2>

<textarea id="paragraph"
placeholder="Write your paragraph here..."></textarea>

<br>

<button onclick="countWords()">Count Words</button>

<p id="result"></p>
</div>

<script>

function countWords() {

    let text =
    document.getElementById("paragraph").value;

    // Remove punctuation
    text = text.replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");

    // Remove extra spaces & new lines
    let words = text.trim().split(/\s+/);

    let count = text.trim() === "" ? 0 : words.length;

    document.getElementById("result").innerText =
    "Total Words: " + count;
}

</script>

</body>
</html>
