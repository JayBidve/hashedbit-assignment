<!DOCTYPE html>
<html>
<head>
    <title>Q11 - Student Average</title>
</head>
<body>

<h2>Required output </h2>

<script>

const students = [
  {
    student1: {
      subject1: 44,
      subject2: 56,
      subject3: 87,
      subject4: 97,
      subject5: 37
    }
  },
  {
    student2: {
      subject1: 44,
      subject2: 56,
      subject3: 87,
      subject4: 97,
      subject5: 37
    }
  },
  {
    student3: {
      subject1: 44,
      subject2: 56,
      subject3: 87,
      subject4: 97,
      subject5: 37
    }
  }
];

const result = students.map(student => {

  let name = Object.keys(student)[0];
  let marks = Object.values(student[name]);

  let average =
      marks.reduce((sum, mark) => sum + mark, 0) / marks.length;

  return {
    [name]: {
      average: Math.round(average)
    }
  };
});

document.body.innerHTML +=
"<pre>" + JSON.stringify(result, null, 2) + "</pre>";

</script>

</body>
</html>
