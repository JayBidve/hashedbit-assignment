<!DOCTYPE html>
<html>
<body>

<h3>Student Average Marks</h3>

<pre id="q7"></pre>

<script>

const students = [
{ name: "Ram", scores: [80,70,60] },
{ name: "Mohan", scores: [80,70,90] },
{ name: "Sai", scores: [60,70,80] },
{ name: "Hemang", scores: [90,90,80,80] }
];

const output = students.map(student => {

let total =
student.scores.reduce(
(sum, mark) => sum + mark, 0);

let avg = total / student.scores.length;

return {
name: student.name,
average: avg
};

});

document.getElementById("q7")
.innerHTML = JSON.stringify(output,null,2);

</script>

</body>
</html>
